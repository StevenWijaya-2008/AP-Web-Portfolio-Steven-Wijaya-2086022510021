<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Skill - Portofolio Steven Wijaya</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f7ff; padding-top: 50px; }
        .form-card { border: none; border-radius: 15px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">Tambah Skill Baru</h2>
                <p class="text-muted">Masukkan detail keahlian teknis Anda</p>
            </div>
            
            <div class="card form-card p-4">
                <form th:action="@{/skills/save}" th:object="${skill}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Nama Skill</label>
                        <input type="text" th:field="*{nama}" class="form-control" id="name" placeholder="Contoh: Java Spring Boot" required>
                    </div>

                    <div class="mb-3">
                        <label for="iconClass" class="form-label fw-bold">Icon Class (FontAwesome)</label>
                        <input type="text" th:field="*{iconClass}" class="form-control" id="iconClass" placeholder="Contoh: fab fa-java text-danger" required>
                        <div class="form-text">Cari di <a href="https://fontawesome.com/icons" target="_blank">FontAwesome</a></div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">Deskripsi</label>
                        <textarea th:field="*{deskripsi}" class="form-control" id="description" rows="3" placeholder="Jelaskan sedikit tentang skill ini..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="percentage" class="form-label fw-bold">Persentase (%)</label>
                        <input type="number" th:field="*{persentase}" class="form-control" id="percentage" min="0" max="100" placeholder="0-100" required>
                    </div>

                    <div class="mb-4">
                        <label for="colorClass" class="form-label fw-bold">Warna (Bootstrap Class)</label>
                        <select th:field="*{colorClass}" class="form-select" id="colorClass">
                            <option value="bg-primary text-primary">Biru (Primary)</option>
                            <option value="bg-success text-success">Hijau (Success)</option>
                            <option value="bg-info text-info">Cyan (Info)</option>
                            <option value="bg-warning text-warning">Kuning (Warning)</option>
                            <option value="bg-danger text-danger">Merah (Danger)</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary fw-bold py-2 rounded-pill">Simpan Skill</button>
                        <a th:href="@{/skills}" class="btn btn-light fw-bold py-2 rounded-pill">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
