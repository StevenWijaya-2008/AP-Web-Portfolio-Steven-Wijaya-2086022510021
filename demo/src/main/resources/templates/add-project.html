<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Project - Portofolio Steven Wijaya</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f7ff; 
            padding-top: 50px; 
        }
        .form-card { 
            border: none; 
            border-radius: 15px; 
            background: white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }
        .icon-header {
            font-size: 3rem;
            color: #0d6efd;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="text-center mb-4">
                <div class="icon-header">
                    <i class="fas fa-project-diagram"></i>
                </div>
                <h2 class="fw-bold text-dark">Detail Project</h2>
                <p class="text-muted">Simpan hasil karya terbaikmu di sini</p>
            </div>
            
            <div class="card form-card p-4 p-md-5">
                <form th:action="@{/projects/save}" th:object="${project}" method="post">
                    
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold small text-uppercase">Judul Project</label>
                        <input type="text" th:field="*{title}" class="form-control form-control-lg" id="title" placeholder="Contoh: Mobile Legend Item Tree" required>
                    </div>

                    <div class="mb-3">
                        <label for="techStack" class="form-label fw-bold small text-uppercase">Teknologi (Tech Stack)</label>
                        <input type="text" th:field="*{techStack}" class="form-control" id="techStack" placeholder="Contoh: Java, Spring Boot, MySQL" required>
                    </div>

                    <div class="mb-3">
                        <label for="githubLink" class="form-label fw-bold small text-uppercase">Link GitHub</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fab fa-github"></i></span>
                            <input type="url" th:field="*{githubLink}" class="form-control" id="githubLink" placeholder="https://github.com/username/repo">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label fw-bold small text-uppercase">Deskripsi Project</label>
                        <textarea th:field="*{description}" class="form-control" id="description" rows="5" placeholder="Jelaskan apa yang kamu kerjakan di project ini..." required></textarea>
                    </div>

                    <div class="row g-2">
                        <div class="col-6">
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-3 rounded-3">
                                <i class="fas fa-save me-2"></i>Simpan
                            </button>
                        </div>
                        <div class="col-6">
                            <a th:href="@{/projects}" class="btn btn-outline-secondary w-100 fw-bold py-3 rounded-3">
                                Batal
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
